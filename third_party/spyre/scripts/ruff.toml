# Linter config for the generated Triton kernel examples.
#
# Copied into the distribution root at generation time so the same
# config is discovered when a reader later runs `ruff check` on a
# checkout of the distribution. Pick your rules conservatively — the
# source files are machine-unparsed from Python AST, so we want errors
# that catch real breakage (undefined names, unused imports) without
# nagging on stylistic choices the generator makes uniformly.

line-length = 120

[lint]
select = ["E", "F", "W"]
ignore = [
    "E501",  # line length — line-length above is already generous
    "E741",  # single-letter names like M, N, K are intentional
]

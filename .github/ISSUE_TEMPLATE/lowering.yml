name: Report a Spyre lowering gap
description: Report a Triton pattern that does not lower, or lowers to surprising IR, in the Spyre backend
labels: ["lowering-gap"]

body:
- type: markdown
  attributes:
    value: |
      The best way to report a lowering gap is a pull request adding a
      `@pattern(..., negative=True, example=[...])` single-pass test that pins
      the unsupported IR. The test should:

      - run today by asserting the current gap,
      - generate an entry in `third_party/spyre/docs/patterns/*.md`,
      - have a clear flip path when the lowering lands: drop `negative=True`
        and update the assertion from "still present" to "lowered away".

      Minimal example:

      ```python
      @pattern("foo", category="compute", negative=True, example=[
          "x = tl.foo(y)   # NOT supported: tt.foo survives lowering",
      ])
      def test_foo_survives(self):
          """tt.foo has no lowering pattern yet; flip when one lands."""
          self.run("module { tt.func @k() { tt.foo : () -> () ; tt.return } }")
          self.assert_present("tt.foo")
      ```

      Add the test to the closest matching file under `third_party/spyre/test/`,
      then run `uv run python third_party/spyre/scripts/gen_patterns_docs.py`
      before opening the PR. Use this issue template if you cannot construct
      the test yet and need maintainer help.
- type: textarea
  attributes:
    label: Triton pattern or IR that exposed the gap
    description: Include the Triton-language fragment, kernel, TTIR, or KTIR snippet that surprised you.
    placeholder: |
      ```python
      x = tl.foo(y)   # expected this to lower, but it does not
      ```
  validations:
    required: true
- type: dropdown
  attributes:
    label: Closest test area
    description: Pick the closest existing test file, or choose unknown if a maintainer should route it.
    options:
      - lower_compute_ops
      - lower_desc_memory
      - distribute_work
      - ktir_examples
      - unknown
  validations:
    required: true
- type: input
  attributes:
    label: Linked negative-pattern PR
    description: If you opened a PR adding a `@pattern(..., negative=True)` test, link it here.
    placeholder: "#NNN"
  validations:
    required: false
- type: textarea
  attributes:
    label: Generated output
    description: Paste the relevant TTIR, KTIR, logs, or test output.
    placeholder: |
      ```
      Relevant generated output
      ```
  validations:
    required: false
- type: textarea
  attributes:
    label: Environment
    description: Include the details needed to reproduce the issue.
    placeholder: |
      OS:
      Python:
      Repository commit:
      Install command:
      TRITON_BACKENDS:
      Submodules initialized: yes/no
  validations:
    required: true

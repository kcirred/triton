name: Report a Triton-Spyre bug
description: Report a build, lowering, or test failure in the Spyre backend
labels: ["bug"]

body:
- type: markdown
  attributes:
    value: |
      Thanks for helping improve Triton-Spyre.

      Before opening a new issue, please search existing issues in this
      repository and check whether the problem still occurs with the latest
      source.
- type: textarea
  attributes:
    label: What happened?
    description: |
      Describe the failure and what you expected instead.

      If possible, include a minimal Triton kernel, TTIR/KTIR snippet, or
      command that reproduces the problem.
    placeholder: |
      A clear description of the failure.

      ```python
      # Minimal reproducer, if available
      ```

      ```
      Full error output or traceback, if available.
      ```
  validations:
    required: true
- type: textarea
  attributes:
    label: Environment
    description: Include the details needed to reproduce the problem.
    placeholder: |
      OS:
      Python:
      Repository commit:
      Install command:
      TRITON_BACKENDS:
      Submodules initialized: yes/no
  validations:
    required: true
- type: textarea
  attributes:
    label: Additional context
    description: Add logs, generated IR, links to fixtures, or other context that may help.
  validations:
    required: false
